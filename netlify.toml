[build]
  command = "pnpm install && pnpm run typecheck:libs && pnpm --filter @workspace/marketing-portfolio run build"
  publish = "artifacts/marketing-portfolio/dist/public"

[build.environment]
  BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Method = ["GET"]}
