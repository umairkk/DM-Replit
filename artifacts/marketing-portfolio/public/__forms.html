<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form registration</title>
  </head>
  <body>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <form name="lead-magnet" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="lead-magnet" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="website" />
      <input type="text" name="adSpend" />
      <input type="text" name="auditType" />
      <input name="bot-field" />
    </form>
  </body>
</html>
